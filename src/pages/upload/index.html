<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battlememe | Upload</title>
  </head>

  <body>
    <nav id="appNav"></nav>

    <main class="container py-4" style="max-width: 920px">
      <section
        class="p-4 p-md-5"
        style="
          border: 2px solid rgba(15,15,16,0.18);
          border-radius: 22px;
          background:
            radial-gradient(900px 260px at 10% 0%, rgba(57,255,20,0.10), transparent 60%),
            radial-gradient(900px 260px at 90% 0%, rgba(255,43,214,0.08), transparent 60%),
            #ffffff;
          box-shadow: 8px 8px 0 rgba(15,15,16,0.10);
        "
      >
        <div class="row g-4 align-items-start">
          <!-- Left: copy -->
          <div class="col-12 col-lg-5">
            <div class="d-flex flex-wrap gap-2 mb-3">
              <span
                class="badge rounded-pill"
                style="background: rgba(57,255,20,0.14); color:#0f0f10; border:1px solid rgba(15,15,16,0.18);"
              >
                ⬆️ Upload
              </span>
              <span
                class="badge rounded-pill"
                style="background: rgba(15,15,16,0.06); color:#0f0f10; border:1px solid rgba(15,15,16,0.18);"
              >
                🧑‍⚖️ Pending approval
              </span>
            </div>

            <h1 class="display-6 m-0" style="font-weight: 950; color:#0f0f10;">
              Drop your meme.
            </h1>
            <p class="mt-2 mb-0 text-muted" style="max-width: 44ch;">
              Give it a title, pick an image, and send it into the arena. Admin approves it → it hits the feed.
            </p>

            <div class="mt-4 text-muted small">
              Tip: use a short title. The internet has no attention span.
            </div>
          </div>

          <!-- Right: form -->
          <div class="col-12 col-lg-7">
            <div
              class="p-4"
              style="
                border: 2px solid rgba(15,15,16,0.12);
                border-radius: 18px;
                background: rgba(255,255,255,0.96);
                box-shadow: 6px 6px 0 rgba(15,15,16,0.08);
              "
            >
              <div id="msg" class="alert d-none" role="alert"></div>

              <form id="uploadForm" class="mt-2">
                <label class="form-label">Title</label>
                <input id="title" class="form-control mb-3" type="text" required />

                <label class="form-label">Image</label>
                <input id="file" class="form-control mb-3" type="file" accept="image/*" required />

                <div class="d-flex gap-2 flex-wrap">
                  <button class="btn btn-primary px-4" type="submit">Upload</button>
                  <a class="btn btn-outline-primary px-4" href="/src/pages/home/index.html">Back to feed</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./page.js"></script>
  </body>
</html>
