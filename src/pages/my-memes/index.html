<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battlememe | My Memes</title>
  </head>

  <body>
    <nav id="appNav"></nav>

    <main class="container py-4">
      <!-- Header panel -->
      <section
        class="p-4 p-md-5 mb-4"
        style="
          border: 2px solid rgba(15,15,16,0.18);
          border-radius: 22px;
          background:
            radial-gradient(900px 260px at 10% 0%, rgba(0,229,255,0.08), transparent 60%),
            radial-gradient(900px 260px at 90% 0%, rgba(57,255,20,0.10), transparent 60%),
            #ffffff;
          box-shadow: 8px 8px 0 rgba(15,15,16,0.10);
        "
      >
        <div class="d-flex align-items-start justify-content-between flex-wrap gap-3">
          <div>
            <div class="d-flex flex-wrap gap-2 mb-3">
              <span
                class="badge rounded-pill"
                style="background: rgba(0,229,255,0.12); color:#0f0f10; border:1px solid rgba(15,15,16,0.18);"
              >
                🧠 Your uploads
              </span>
              <span
                class="badge rounded-pill"
                style="background: rgba(15,15,16,0.06); color:#0f0f10; border:1px solid rgba(15,15,16,0.18);"
              >
                ✅ Approved / ⏳ Pending / ❌ Rejected
              </span>
            </div>

            <h1 class="display-6 m-0" style="font-weight: 950; color:#0f0f10;">
              My Memes
            </h1>
            <p class="mt-2 mb-0 text-muted" style="max-width: 60ch;">
              Track your uploads and their status. Approved memes hit the feed, pending ones wait in the queue.
            </p>
          </div>

          <div style="align-self: center;">
            <a class="btn btn-primary px-4" href="/src/pages/upload/index.html">Upload new</a>
          </div>
        </div>
      </section>

      <!-- List panel -->
      <section
        class="p-4"
        style="
          border: 2px solid rgba(15,15,16,0.12);
          border-radius: 18px;
          background:
            radial-gradient(1200px 260px at 20% 0%, rgba(255,43,214,0.06), transparent 55%),
            radial-gradient(1200px 260px at 80% 0%, rgba(57,255,20,0.06), transparent 55%),
            #ffffff;
          box-shadow: 6px 6px 0 rgba(15,15,16,0.08);
        "
      >
        <div id="msg" class="alert d-none" role="alert"></div>

        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
          <div class="h5 m-0">Your list</div>
          <div class="text-muted small">Open • Delete</div>
        </div>

        <div id="list" class="row g-3"></div>
      </section>
    </main>

    <script type="module" src="./page.js"></script>
  </body>
</html>
