<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meme Arena | Register</title>
  </head>

  <body>
    <nav id="appNav"></nav>

    <main class="container py-4" style="max-width: 520px">
      <h1 class="h3 mb-3">Register</h1>

      <div id="msg" class="alert d-none" role="alert"></div>

      <form id="registerForm" class="card card-body">
        <label class="form-label">Display name</label>
        <input id="displayName" class="form-control mb-3" type="text" required />

        <label class="form-label">Email</label>
        <input id="email" class="form-control mb-3" type="email" required />

        <label class="form-label">Password</label>
        <input id="password" class="form-control mb-3" type="password" required />

        <button class="btn btn-primary" type="submit">Create account</button>

        <p class="text-muted mt-3 mb-0">
          Already have an account? <a href="/src/pages/login/index.html">Login</a>
        </p>
      </form>
    </main>

    <script type="module" src="./page.js"></script>
  </body>
</html>
