<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meme Arena | Login</title>
  </head>

  <body>
    <nav id="appNav"></nav>

    <main class="container py-4" style="max-width: 560px">
      <div class="card p-4">
        <h1 class="h4 mb-1">Login</h1>
        <p class="text-muted mb-3">Welcome back. Go cause chaos responsibly.</p>

        <div id="msg" class="alert d-none" role="alert"></div>

        <form id="loginForm">
          <label class="form-label">Email</label>
          <input id="email" class="form-control mb-3" type="email" required />

          <label class="form-label">Password</label>
          <input id="password" class="form-control mb-3" type="password" required />

          <button class="btn btn-primary w-100" type="submit">Login</button>

          <p class="text-muted mt-3 mb-0">
            No account? <a href="/src/pages/register/index.html">Register</a>
          </p>
        </form>
      </div>
    </main>

    <script type="module" src="./page.js"></script>
  </body>
</html>
