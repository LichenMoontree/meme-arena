<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battlememe | Login</title>
  </head>

  <body>
    <nav id="appNav"></nav>

    <main class="container py-4" style="max-width: 720px">
      <section
        class="p-4 p-md-5"
        style="
          border: 2px solid rgba(15,15,16,0.18);
          border-radius: 22px;
          background:
            radial-gradient(900px 260px at 15% 0%, rgba(57,255,20,0.10), transparent 60%),
            radial-gradient(900px 260px at 85% 0%, rgba(0,229,255,0.08), transparent 60%),
            #ffffff;
          box-shadow: 8px 8px 0 rgba(15,15,16,0.10);
        "
      >
        <div class="row g-4 align-items-center">
          <!-- Left: copy -->
          <div class="col-12 col-lg-5">
            <div class="d-flex flex-wrap gap-2 mb-3">
              <span
                class="badge rounded-pill"
                style="background: rgba(57,255,20,0.14); color:#0f0f10; border:1px solid rgba(15,15,16,0.18);"
              >
                🔐 Login
              </span>
              <span
                class="badge rounded-pill"
                style="background: rgba(15,15,16,0.06); color:#0f0f10; border:1px solid rgba(15,15,16,0.18);"
              >
                💬 Vote & comment
              </span>
            </div>

            <h1 class="display-6 m-0" style="font-weight: 950; color:#0f0f10;">
              Welcome back.
            </h1>
            <p class="mt-2 mb-0 text-muted" style="max-width: 40ch;">
              Sign in to upload memes, vote, and drop your finest roasts.
            </p>
          </div>

          <!-- Right: form -->
          <div class="col-12 col-lg-7">
            <div
              class="p-4"
              style="
                border: 2px solid rgba(15,15,16,0.12);
                border-radius: 18px;
                background: rgba(255,255,255,0.96);
                box-shadow: 6px 6px 0 rgba(15,15,16,0.08);
              "
            >
              <div id="msg" class="alert d-none" role="alert"></div>

              <form id="loginForm">
                <label class="form-label">Email</label>
                <input id="email" class="form-control mb-3" type="email" required />

                <label class="form-label">Password</label>
                <input id="password" class="form-control mb-3" type="password" required />

                <button class="btn btn-primary w-100" type="submit">Login</button>

                <p class="text-muted mt-3 mb-0">
                  No account? <a href="/src/pages/register/index.html">Register</a>
                </p>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./page.js"></script>
  </body>
</html>
