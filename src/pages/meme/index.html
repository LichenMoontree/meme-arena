<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meme Arena | Meme</title>
  </head>

  <body>
    <nav id="appNav"></nav>

    <main class="container py-4" style="max-width: 900px">
      <div id="msg" class="alert d-none" role="alert"></div>

      <h1 id="title" class="h3 mb-2">Meme</h1>
      <div id="meta" class="text-muted mb-3"></div>

      <img
        id="img"
        alt="meme"
        class="img-fluid rounded shadow-sm"
        style="max-height: 520px; object-fit: contain; width: 100%"
      />

      <hr class="my-4" />

      <div id="voteBox" class="d-none">
        <div class="d-flex align-items-center gap-2">
          <button id="upBtn" class="btn btn-success btn-sm" type="button">Upvote</button>
          <button id="downBtn" class="btn btn-danger btn-sm" type="button">Downvote</button>
          <span class="ms-2 text-muted">Score: <strong id="score">0</strong></span>
        </div>
      </div>

      <div id="loginHint" class="alert alert-info d-none mt-3">
        Login to vote and comment.
      </div>

      <h2 class="h5 mt-4">Comments</h2>
      <div id="comments" class="mt-2"></div>

      <form id="commentForm" class="mt-3 d-none">
        <div class="input-group">
          <input id="comment" class="form-control" placeholder="Write a comment…" />
          <button class="btn btn-primary" type="submit">Post</button>
        </div>
      </form>
    </main>

    <script type="module" src="./page.js"></script>
  </body>
</html>
