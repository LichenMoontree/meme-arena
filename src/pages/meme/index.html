<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meme Arena | Meme</title>
  </head>

  <body>
    <nav id="appNav"></nav>

    <main class="container py-4" style="max-width: 980px">
      <div id="msg" class="alert d-none" role="alert"></div>

      <div class="row g-4">
        <!-- Meme card -->
        <div class="col-12 col-lg-7">
          <div class="card p-3">
            <h1 id="title" class="h4 mb-2">Meme</h1>
            <div id="meta" class="text-muted small mb-3"></div>

            <div class="rounded-4 overflow-hidden border" style="border-color: rgba(34,24,28,0.10) !important;">
              <img
                id="img"
                alt="meme"
                class="img-fluid"
                style="max-height: 560px; object-fit: contain; width: 100%"
              />
            </div>
          </div>
        </div>

        <!-- Interaction panel -->
        <div class="col-12 col-lg-5">
          <div class="card p-3">
            <div class="d-flex align-items-center justify-content-between">
              <h2 class="h6 mb-0">Reactions</h2>
              <span class="badge rounded-pill" style="background: rgba(89,201,165,0.16); color:#22181C;">
                Score: <strong id="score">0</strong>
              </span>
            </div>

            <div id="voteBox" class="d-none mt-3">
              <div class="d-flex gap-2">
                <button id="upBtn" class="btn btn-primary w-100" type="button">👍 Upvote</button>
                <button id="downBtn" class="btn btn-outline-danger w-100" type="button">👎 Downvote</button>
              </div>
            </div>

            <div id="loginHint" class="alert alert-info d-none mt-3 mb-0">
              Login to vote and comment.
            </div>

            <hr class="my-4" />

            <div class="d-flex align-items-center justify-content-between">
              <h2 class="h6 mb-0">Comments</h2>
              <span id="commentCount" class="text-muted small"></span>
            </div>

            <div id="comments" class="mt-3"></div>

            <form id="commentForm" class="mt-3 d-none">
              <div class="input-group">
                <input id="comment" class="form-control" placeholder="Write a comment…" />
                <button class="btn btn-primary" type="submit">Post</button>
              </div>
              <div class="form-text">Be nice. Or at least be funny.</div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="./page.js"></script>
  </body>
</html>
